<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DenmarkAPI — Harvest Dashboard</title>
<style>
  :root { color-scheme: light dark; }
  body { font: 15px/1.5 system-ui, sans-serif; margin: 0; padding: 24px; max-width: 820px; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: #888; font-size: 13px; margin-bottom: 20px; }
  .stale { color: #c0392b; font-weight: 600; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin: 16px 0; }
  .card { border: 1px solid #8883; border-radius: 10px; padding: 12px 14px; }
  .card .n { font-size: 24px; font-weight: 700; }
  .card .l { color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
  .bar { height: 12px; background: #8882; border-radius: 6px; overflow: hidden; margin: 6px 0 2px; }
  .bar > i { display: block; height: 100%; background: #2e8b57; }
  table { border-collapse: collapse; width: 100%; margin-top: 8px; }
  th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid #8883; font-size: 14px; }
  td.n { text-align: right; font-variant-numeric: tabular-nums; }
  .muted { color: #888; }
  section { margin-top: 26px; }
</style>
</head>
<body>
  <h1>DenmarkAPI — Smiley PDF Harvest</h1>
  <div class="sub" id="updated">loading…</div>

  <section>
    <div class="l muted">Business pages scraped</div>
    <div class="bar"><i id="busbar" style="width:0"></i></div>
    <div class="sub"><span id="busnum">–</span></div>
  </section>

  <div class="grid" id="cards"></div>

  <section>
    <h3 style="margin-bottom:4px">Errors (aggregated)</h3>
    <table><tbody id="errs"><tr><td class="muted">–</td></tr></tbody></table>
  </section>

<script>
function fmtBytes(b){ if(!b) return "0 B"; const u=["B","KB","MB","GB","TB"]; let i=Math.floor(Math.log(b)/Math.log(1024)); return (b/Math.pow(1024,i)).toFixed(1)+" "+u[i]; }
function ago(ts){ const s=Math.floor(Date.now()/1000-ts); if(s<60) return s+"s ago"; if(s<3600) return Math.floor(s/60)+"m ago"; return Math.floor(s/3600)+"h ago"; }
async function tick(){
  try{
    const r = await fetch("status.json?_="+Date.now(), {cache:"no-store"});
    const s = await r.json();
    const staleS = Math.floor(Date.now()/1000 - s.updated_at);
    const upd = document.getElementById("updated");
    upd.innerHTML = "Updated " + ago(s.updated_at) + (staleS>120 ? " <span class='stale'>(GPU box may be off / paused)</span>" : "");
    const b = s.businesses, rp = s.reports, p = s.pdfs;
    const pct = b.total ? (100*b.done/b.total) : 0;
    document.getElementById("busbar").style.width = pct.toFixed(1)+"%";
    document.getElementById("busnum").textContent = b.done.toLocaleString()+" / "+b.total.toLocaleString()+" ("+pct.toFixed(1)+"%)"+(b.failed?("  ·  "+b.failed+" failed"):"");
    const cards = [
      ["PDFs downloaded", p.count.toLocaleString()],
      ["PDF size", fmtBytes(p.bytes)],
      ["Rate", s.rate.pdfs_per_min_5m + " /min"],
      ["Reports pending", rp.pending.toLocaleString()],
      ["Reports failed", rp.failed.toLocaleString()],
      ["Reports skipped", rp.skipped.toLocaleString()],
    ];
    document.getElementById("cards").innerHTML = cards.map(([l,n])=>`<div class="card"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("");
    const errs = s.errors && s.errors.length
      ? s.errors.map(e=>`<tr><td>${e.key}</td><td class="n">${e.count.toLocaleString()}</td></tr>`).join("")
      : `<tr><td class="muted">no errors</td></tr>`;
    document.getElementById("errs").innerHTML = errs;
  }catch(e){
    document.getElementById("updated").innerHTML = "<span class='stale'>cannot load status.json</span>";
  }
}
tick(); setInterval(tick, 5000);
</script>
</body>
</html>
