<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DenmarkAPI — Dashboard</title>
<style>
  :root { color-scheme: light dark; }
  body { font: 15px/1.5 system-ui, sans-serif; margin: 0 auto; padding: 24px; max-width: 860px; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  h3 { margin: 24px 0 6px; font-size: 14px; text-transform: uppercase; letter-spacing: .05em; color: #888; }
  .sub { color: #888; font-size: 13px; }
  .stale { color: #c0392b; font-weight: 600; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin: 10px 0; }
  .card { border: 1px solid #8883; border-radius: 10px; padding: 12px 14px; }
  .card .n { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .card .l { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
  .bar { height: 12px; background: #8882; border-radius: 6px; overflow: hidden; margin: 6px 0 2px; }
  .bar > i { display: block; height: 100%; background: #2e8b57; transition: width .5s; }
  table { border-collapse: collapse; width: 100%; }
  td { padding: 5px 10px; border-bottom: 1px solid #8883; font-size: 14px; }
  td.n { text-align: right; font-variant-numeric: tabular-nums; }
  .muted { color: #888; }
  .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 7px; }
  .up { background: #2ecc71; } .down { background: #c0392b; }
  .pills span { display: inline-block; padding: 5px 10px; border: 1px solid #8883; border-radius: 20px; margin: 3px 6px 3px 0; font-size: 13px; }
</style>
</head>
<body>
  <h1>DenmarkAPI — Dashboard</h1>
  <div class="sub" id="updated">loading…</div>

  <h3>Smiley PDF harvest</h3>
  <div class="sub">Business pages scraped</div>
  <div class="bar"><i id="busbar" style="width:0"></i></div>
  <div class="sub" id="busnum">–</div>
  <div class="grid" id="cards"></div>

  <h3>Extraction (deterministic — keyword MENTIONS, not findings; LLM resolves)</h3>
  <div class="grid" id="extract"></div>

  <h3>What's running</h3>
  <div class="pills" id="services">–</div>

  <h3>News poller (RSS)</h3>
  <div class="grid" id="rss"></div>

  <h3>Errors (aggregated)</h3>
  <table><tbody id="errs"><tr><td class="muted">–</td></tr></tbody></table>

<script>
const fmtN = n => (n==null?"–":Number(n).toLocaleString());
const fmtBytes = b => { if(!b) return "0 B"; const u=["B","KB","MB","GB","TB"]; let i=Math.floor(Math.log(b)/Math.log(1024)); return (b/1024**i).toFixed(1)+" "+u[i]; };
function fmtDur(s){ if(s==null) return "–"; s=Math.max(0,Math.round(s)); const d=Math.floor(s/86400),h=Math.floor(s%86400/3600),m=Math.floor(s%3600/60); if(d) return d+"d "+h+"h"; if(h) return h+"h "+m+"m"; if(m) return m+"m "+(s%60)+"s"; return s+"s"; }
function ago(s){ if(s==null) return "never"; if(s<60) return s+"s ago"; if(s<3600) return Math.floor(s/60)+"m ago"; return Math.floor(s/3600)+"h ago"; }

async function tick(){
  let s;
  try { s = await (await fetch("status.json?_="+Date.now(),{cache:"no-store"})).json(); }
  catch(e){ document.getElementById("updated").innerHTML="<span class='stale'>cannot load status</span>"; return; }
  const staleS = Math.floor((s.server_now||Date.now()/1000) - (s.updated_at||0));
  document.getElementById("updated").innerHTML = "Snapshot "+ago(staleS)+(staleS>15?" <span class='stale'>(GPU box off / paused)</span>":"");

  const b=s.businesses||{}, rp=s.reports||{}, p=s.pdfs||{}, d=s.derived||{};
  const pct = b.total? 100*b.done/b.total : 0;
  document.getElementById("busbar").style.width = pct.toFixed(1)+"%";
  document.getElementById("busnum").textContent = fmtN(b.done)+" / "+fmtN(b.total)+" ("+pct.toFixed(1)+"%)"+(b.failed?"  ·  "+b.failed+" failed":"");

  const cards = [
    ["PDFs downloaded", fmtN(p.count)],
    ["PDF size", fmtBytes(p.bytes)],
    ["Throughput", (d.throughput_mb_per_s??0)+" MB/s"],
    ["Rate", (d.report_rate_per_s??0)+" /s"],
    ["ETA", fmtDur(d.eta_seconds)],
    ["Est. total reports", fmtN(d.est_total_reports)],
    ["Pending", fmtN(rp.pending)],
    ["Skipped (no PDF)", fmtN(rp.skipped)],
  ];
  document.getElementById("cards").innerHTML = cards.map(([l,n])=>`<div class="card"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("");

  const x = s.extract||{};
  document.getElementById("extract").innerHTML = [
    ["Extracted", fmtN(x.extracted)],
    ["Reports", fmtN(x.reports)],
    ["Placards", fmtN(x.placards)],
    ["Pest mentions", fmtN(x.pest)],
    ["Injunction mentions", fmtN(x.injunctions)],
    ["Fee mentions", fmtN(x.fees)],
  ].map(([l,n])=>`<div class="card"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("");

  document.getElementById("services").innerHTML = (s.services||[]).map(x=>
    `<span><i class="dot ${x.up?'up':'down'}"></i>${x.name}</span>`).join("");

  const r=s.rss||{};
  document.getElementById("rss").innerHTML = [
    ["Articles archived", fmtN(r.articles)],
    ["New (24h)", fmtN(r.new_24h)],
    ["Feeds", fmtN(r.sources)],
    ["Last poll", ago(r.last_poll_ago_s)],
  ].map(([l,n])=>`<div class="card"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("");

  const e=s.errors||[];
  document.getElementById("errs").innerHTML = e.length
    ? e.map(x=>`<tr><td>${x.key}</td><td class="n">${fmtN(x.count)}</td></tr>`).join("")
    : `<tr><td class="muted">no errors</td></tr>`;
}
tick(); setInterval(tick, 1000);
</script>
</body>
</html>
